name: Garden reminder email

on:
  schedule:
    # Roughly every 3 days (1st, 4th, 7th… of each month) at 15:00 UTC
    - cron: "0 15 */3 * *"
  workflow_dispatch:
    inputs:
      first:
        description: "Send the first 'Are you still playing?' email"
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send reminder via Gmail SMTP
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REMINDER_TO: ${{ secrets.REMINDER_TO }}
          REMINDER_FIRST: ${{ inputs.first && '1' || '' }}
        run: python3 scripts/send-reminder.py
