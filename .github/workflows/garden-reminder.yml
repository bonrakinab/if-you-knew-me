name: Garden reminder email

on:
  schedule:
    # Roughly every 3 days (1st, 4th, 7th… of each month) at 15:00 UTC
    - cron: "0 15 */3 * *"
  workflow_dispatch:
    inputs:
      first:
        description: "Send the first 'Are you still playing?' email"
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Send reminder
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_TO: ${{ secrets.REMINDER_TO }}
          REMINDER_FROM: ${{ secrets.REMINDER_FROM }}
          REMINDER_FIRST: ${{ inputs.first && '1' || '' }}
        run: node scripts/send-reminder.mjs
